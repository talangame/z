<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Poker Vietnam</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 70% 20%, rgba(201, 154, 74, 0.18), transparent 28%),
        radial-gradient(circle at 15% 80%, rgba(9, 92, 67, 0.22), transparent 35%),
        linear-gradient(135deg, #030403 0%, #080908 45%, #010101 100%);
      color: #f5ead7;
      font-family: "Inter", sans-serif;
      overflow: hidden;
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      isolation: isolate;
    }

    .noise {
      position: absolute;
      inset: 0;
      background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
      opacity: 0.16;
      pointer-events: none;
      z-index: -3;
    }

    .glow {
      position: absolute;
      width: 620px;
      height: 620px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.18), transparent 68%);
      filter: blur(20px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -2;
    }

    .cards {
      position: absolute;
      width: 380px;
      height: 520px;
      right: 8%;
      top: 50%;
      transform: translateY(-50%) rotate(-8deg);
      opacity: 0.9;
      z-index: -1;
    }

    .card {
      position: absolute;
      width: 230px;
      height: 330px;
      border-radius: 22px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03)),
        linear-gradient(135deg, #10110f, #050505);
      border: 1px solid rgba(212, 175, 55, 0.45);
      box-shadow:
        0 30px 80px rgba(0,0,0,0.65),
        inset 0 0 40px rgba(212,175,55,0.06);
      backdrop-filter: blur(12px);
    }

    .card:nth-child(1) {
      transform: rotate(-12deg);
      left: 0;
      top: 70px;
    }

    .card:nth-child(2) {
      transform: rotate(8deg);
      left: 105px;
      top: 30px;
    }

    .card::before {
      content: "A";
      position: absolute;
      top: 26px;
      left: 28px;
      font-family: "Cinzel", serif;
      font-size: 42px;
      color: #d4af37;
    }

    .card::after {
      content: "♠";
      position: absolute;
      bottom: 28px;
      right: 30px;
      font-size: 58px;
      color: #d4af37;
    }

    .content {
      width: 100%;
      max-width: 1120px;
      position: relative;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      margin-bottom: 30px;
      border: 1px solid rgba(212,175,55,0.42);
      border-radius: 999px;
      color: #d8bd79;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.035);
      backdrop-filter: blur(10px);
    }

    .badge span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #d4af37;
      box-shadow: 0 0 18px #d4af37;
    }

    h1 {
      max-width: 760px;
      font-family: "Cinzel", serif;
      font-size: clamp(48px, 7vw, 104px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 700;
      color: #fff7e7;
      text-shadow: 0 18px 50px rgba(0,0,0,0.75);
    }

    h1 em {
      font-style: normal;
      color: #d4af37;
    }

    .subtitle {
      max-width: 560px;
      margin-top: 30px;
      color: rgba(245, 234, 215, 0.78);
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.65;
      font-weight: 300;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 22px;
      margin-top: 46px;
      flex-wrap: wrap;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 260px;
      padding: 18px 34px;
      border-radius: 999px;
      color: #090806;
      background: linear-gradient(135deg, #f7df9a, #c99a4a 45%, #fff0b7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      box-shadow:
        0 18px 50px rgba(212,175,55,0.28),
        inset 0 1px 0 rgba(255,255,255,0.55);
      transition: transform .35s ease, box-shadow .35s ease;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow:
        0 26px 70px rgba(212,175,55,0.38),
        inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .note {
      color: rgba(245,234,215,0.5);
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    .status {
      position: fixed;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      padding: 12px 20px;
      border-radius: 999px;
      background: rgba(10, 12, 10, 0.8);
      color: #d4af37;
      border: 1px solid rgba(212,175,55,0.35);
      backdrop-filter: blur(14px);
      font-size: 13px;
      transition: .35s ease;
      pointer-events: none;
    }

    .status.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .page {
        justify-content: flex-start;
        padding: 32px 22px;
      }

      .cards {
        right: -80px;
        top: 68%;
        transform: translateY(-50%) scale(0.72) rotate(-8deg);
        opacity: 0.32;
      }

      .subtitle {
        max-width: 100%;
      }

      .btn {
        width: 100%;
      }

      .note {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="noise"></div>
    <div class="glow"></div>

    <div class="cards">
      <div class="card"></div>
      <div class="card"></div>
    </div>

    <section class="content">
      <div class="badge"><span></span> PRIVATE POKER VIETNAM</div>

      <h1>
        Câu lạc bộ Poker <em>đẳng cấp</em> tại Việt Nam
      </h1>

      <p class="subtitle">
        Không gian riêng tư dành cho những người chơi tinh tế.
        Trải nghiệm sang trọng, dịch vụ cao cấp và sự kín đáo tuyệt đối.
      </p>

      <div class="actions">
        <button class="btn" onclick="openMessenger()">
          Nhận lời mời
        </button>

        <div class="note">
          Quyền truy cập chỉ dành cho khách được chọn
        </div>
      </div>
    </section>

    <div class="status" id="status">
      Đã sao chép tin nhắn: “Tôi muốn chơi poker”
    </div>
  </main>

  <script>
    const facebookLink = "https://www.facebook.com/share/1EbaFos3jf/?mibextid=wwXIfr";
    const messageText = "Tôi muốn chơi poker";

    function openMessenger() {
      navigator.clipboard.writeText(messageText).then(() => {
        showStatus();
        setTimeout(() => {
          window.location.href = facebookLink;
        }, 550);
      }).catch(() => {
        window.location.href = facebookLink;
      });
    }

    function showStatus() {
      const status = document.getElementById("status");
      status.classList.add("show");

      setTimeout(() => {
        status.classList.remove("show");
      }, 2200);
    }
  </script>
</body>
</html>
