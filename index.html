<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Private Poker Vietnam</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #030303;
      color: #fff3dc;
      font-family: "Inter", sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      min-height: 100svh;
      display: flex;
      align-items: center;
      padding: max(28px, env(safe-area-inset-top)) 24px max(34px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 75% 20%, rgba(218, 174, 78, .22), transparent 28%),
        radial-gradient(circle at 15% 85%, rgba(0, 95, 67, .32), transparent 34%),
        linear-gradient(135deg, #020302 0%, #090909 48%, #010101 100%);
      overflow: hidden;
      isolation: isolate;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(255,255,255,.05), transparent 20%),
        url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
      opacity: .16;
      z-index: -4;
    }

    .gold-orb {
      position: absolute;
      width: 560px;
      height: 560px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,.22), transparent 66%);
      filter: blur(24px);
      right: -160px;
      top: 5%;
      z-index: -3;
    }

    .green-orb {
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,92,70,.24), transparent 68%);
      filter: blur(30px);
      left: -200px;
      bottom: -160px;
      z-index: -3;
    }

    .cards {
      position: absolute;
      right: 7vw;
      top: 50%;
      width: 360px;
      height: 480px;
      transform: translateY(-50%) rotate(-8deg);
      z-index: -1;
      opacity: .95;
    }

    .card {
      position: absolute;
      width: 220px;
      height: 320px;
      border-radius: 24px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.025)),
        linear-gradient(135deg, #12120f, #050505);
      border: 1px solid rgba(212,175,55,.46);
      box-shadow:
        0 40px 100px rgba(0,0,0,.72),
        inset 0 0 50px rgba(212,175,55,.055);
      backdrop-filter: blur(16px);
    }

    .card:first-child {
      left: 0;
      top: 82px;
      transform: rotate(-14deg);
    }

    .card:last-child {
      left: 110px;
      top: 30px;
      transform: rotate(8deg);
    }

    .card::before {
      content: "A";
      position: absolute;
      top: 26px;
      left: 28px;
      font-family: "Cinzel", serif;
      font-size: 44px;
      color: #d9b75d;
    }

    .card::after {
      content: "♠";
      position: absolute;
      right: 30px;
      bottom: 24px;
      font-size: 62px;
      color: #d9b75d;
      text-shadow: 0 0 24px rgba(212,175,55,.3);
    }

    .wrap {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
    }

    .content {
      max-width: 760px;
      animation: reveal .9s ease both;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(212,175,55,.42);
      background: rgba(255,255,255,.035);
      backdrop-filter: blur(16px);
      color: #d6b56b;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .24em;
      text-transform: uppercase;
    }

    .badge span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #d4af37;
      box-shadow: 0 0 18px #d4af37;
    }

    h1 {
      font-family: "Cinzel", serif;
      max-width: 820px;
      font-size: clamp(44px, 8vw, 104px);
      line-height: .94;
      letter-spacing: -.055em;
      font-weight: 700;
      color: #fff7e7;
      text-shadow: 0 20px 60px rgba(0,0,0,.82);
    }

    h1 span {
      color: #d4af37;
    }

    .subtitle {
      max-width: 580px;
      margin-top: 30px;
      font-size: clamp(16px, 2vw, 22px);
      line-height: 1.65;
      color: rgba(255,243,220,.76);
      font-weight: 300;
    }

    .cta-row {
      margin-top: 46px;
      display: flex;
      align-items: center;
      gap: 22px;
      flex-wrap: wrap;
    }

    .btn {
      position: relative;
      min-width: 270px;
      border: 0;
      border-radius: 999px;
      padding: 19px 36px;
      cursor: pointer;
      color: #080704;
      background: linear-gradient(135deg, #fff1b8 0%, #d8af55 40%, #b9832d 62%, #fff0b1 100%);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      box-shadow:
        0 22px 64px rgba(212,175,55,.34),
        inset 0 1px 0 rgba(255,255,255,.72);
      transition: transform .35s ease, box-shadow .35s ease;
    }

    .btn:active {
      transform: scale(.98);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow:
        0 30px 80px rgba(212,175,55,.45),
        inset 0 1px 0 rgba(255,255,255,.78);
    }

    .small {
      color: rgba(255,243,220,.48);
      font-size: 13px;
      letter-spacing: .08em;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(28px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      width: calc(100% - 36px);
      max-width: 430px;
      padding: 14px 18px;
      border-radius: 999px;
      text-align: center;
      background: rgba(8, 9, 7, .82);
      border: 1px solid rgba(212,175,55,.36);
      color: #d8b969;
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      font-size: 13px;
      transition: .35s ease;
      pointer-events: none;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 780px) {
      .hero {
        align-items: flex-start;
        padding-top: max(34px, env(safe-area-inset-top));
      }

      .content {
        padding-top: 7vh;
      }

      .badge {
        font-size: 10px;
        padding: 9px 14px;
        letter-spacing: .18em;
        margin-bottom: 26px;
      }

      h1 {
        font-size: clamp(42px, 14vw, 68px);
        letter-spacing: -.06em;
      }

      .subtitle {
        margin-top: 24px;
        font-size: 16.5px;
        line-height: 1.62;
      }

      .cta-row {
        margin-top: 38px;
        gap: 16px;
      }

      .btn {
        width: 100%;
        min-width: 0;
        padding: 18px 24px;
        font-size: 13px;
      }

      .small {
        width: 100%;
        text-align: center;
        font-size: 12px;
      }

      .cards {
        right: -132px;
        top: 71%;
        transform: translateY(-50%) scale(.72) rotate(-8deg);
        opacity: .36;
      }

      .gold-orb {
        width: 420px;
        height: 420px;
        right: -220px;
        top: 18%;
      }

      .green-orb {
        width: 420px;
        height: 420px;
        left: -230px;
        bottom: -120px;
      }
    }

    @media (max-width: 390px) {
      .hero {
        padding-left: 18px;
        padding-right: 18px;
      }

      h1 {
        font-size: 40px;
      }

      .subtitle {
        font-size: 15.5px;
      }
    }
  </style>
</head>

<body>
  <main class="hero">
    <div class="gold-orb"></div>
    <div class="green-orb"></div>

    <div class="cards" aria-hidden="true">
      <div class="card"></div>
      <div class="card"></div>
    </div>

    <div class="wrap">
      <section class="content">
        <div class="badge">
          <span></span>
          Private Poker Vietnam
        </div>

        <h1>
          Câu lạc bộ Poker <span>đẳng cấp</span> tại Việt Nam
        </h1>

        <p class="subtitle">
          Không gian riêng tư dành cho những người chơi tinh tế.
          Trải nghiệm sang trọng, dịch vụ cao cấp và sự kín đáo tuyệt đối.
        </p>

        <div class="cta-row">
          <button class="btn" onclick="openMessenger()">
            Nhận lời mời
          </button>

          <div class="small">
            Chỉ dành cho khách được chọn
          </div>
        </div>
      </section>
    </div>

    <div class="toast" id="toast">
      Đang mở Messenger...
    </div>
  </main>

  <script>
    /*
      ВАЖНО:
      Замени YOUR_PAGE_USERNAME на username Facebook-страницы.
      Пример:
      const pageUsername = "royalpokervietnam";
    */

    const pageUsername = "YOUR_PAGE_USERNAME";

    const message = "Tôi muốn chơi poker";
    const encodedMessage = encodeURIComponent(message);

    const messengerMobile = `fb-messenger://user-thread/${pageUsername}`;
    const messengerWeb = `https://m.me/${pageUsername}?text=${encodedMessage}`;

    function openMessenger() {
      showToast();

      copyMessage();

      const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

      if (isMobile) {
        window.location.href = messengerWeb;
      } else {
        window.location.href = messengerWeb;
      }
    }

    function copyMessage() {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(message).catch(() => {});
      }
    }

    function showToast() {
      const toast = document.getElementById("toast");
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }
  </script>
</body>
</html>
